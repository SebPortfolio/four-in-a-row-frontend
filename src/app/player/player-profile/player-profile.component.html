<div class="col-md-12">
  <div class="header separator">
    <span class="heading">{{ player?.displayName }}</span>
    <button type="button" class="btn btn-secondary" (click)="onEditDisplayName()">
      <fa-icon [icon]="faPenToSquare"></fa-icon>
    </button>
  </div>
  @if (player) {
    <div class="row">
      <app-player-statistic class="col-md-4" [player]="player!"></app-player-statistic>
    </div>
  }
</div>
